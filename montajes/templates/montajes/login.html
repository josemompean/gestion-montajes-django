{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Configuración básica del documento -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Gestión de Montajes</title>
    
    <!-- Recursos externos: fuentes, iconos y estilos -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="{% static 'css/estilos.css' %}">
</head>
<body class="login-page">
    <!-- Contenedor principal de la página de login -->
    <div class="login-container">
        <div class="login-box">
            <!-- Cabecera del formulario de login -->
            <div class="login-header">
                <h1>Gestión de Montajes</h1>
                <p class="subtitle">Accede a tu cuenta</p>
            </div>
            
            <!-- Formulario de inicio de sesión -->
            <form method="POST" class="login-form">
                {% csrf_token %}
                
                <!-- Campo de usuario -->
                <div class="form-group">
                    <label for="{{ form.username.id_for_label }}">
                        <i class="fas fa-user"></i> Usuario
                    </label>
                    {{ form.username }}
                </div>
                
                <!-- Campo de contraseña -->
                <div class="form-group">
                    <label for="{{ form.password.id_for_label }}">
                        <i class="fas fa-lock"></i> Contraseña
                    </label>
                    {{ form.password }}
                </div>
                
                <!-- Mensajes de error -->
                {% if form.errors %}
                <div class="error-message">
                    <i class="fas fa-exclamation-circle"></i> Usuario o contraseña incorrectos
                </div>
                {% endif %}
                
                <!-- Botón de inicio de sesión -->
                <button type="submit" class="login-button">
                    <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                </button>
            </form>
            
            <!-- Pie de página con enlace a registro -->
            <div class="login-footer">
                <p>¿No tienes cuenta? <a href="{% url 'registro' %}">Regístrate aquí</a></p>
            </div>
        </div>
    </div>
</body>
</html>
